global
    log stdout format raw local0

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend http_front
    bind *:80
    default_backend http_back

backend http_back
    balance roundrobin
    # Provide health checks explicitly
    # To use actuator health check use: option httpchk GET /actuator/health
    option httpchk GET /actuator/health
    server app1 app1:8080 check
    server app2 app2:8080 check
