services:
  app1:
    build: .
    container_name: app1
    restart: always
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app2:
    build: .
    container_name: app2
    restart: always
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  haproxy:
    image: haproxy:2.8
    container_name: haproxy
    restart: always
    ports:
      - "${PORT}:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
